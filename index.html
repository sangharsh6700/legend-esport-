<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Esports Pro Series</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');

        :root {
            --primary-purple: #9d00ff;
            --bg-white: #ffffff;
            --shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        /* FIX: This forces the browser to show colors when saving/printing */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* UI Control Buttons (Hidden on Save) */
        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-add { background: #333; color: white; }
        .btn-save { background: var(--primary-purple); color: white; }

        /* Main Container */
        .container {
            background-color: var(--bg-white);
            width: 900px;
            padding: 60px;
            min-height: 1000px;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        /* --- HEADER BOX FIXED --- */
        .header-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .side-accent {
            width: 10px;
            height: 70px;
            background: var(--primary-purple);
            transform: skewX(-25deg);
            flex-shrink: 0;
        }

        h1 {
            font-size: 70px;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            outline: none;
            text-align: center;
        }

        .sub-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
            outline: none;
        }

        .bottom-line {
            width: 80%;
            height: 12px;
            background: var(--primary-purple);
            margin-top: 20px;
            transform: skewX(-45deg);
        }

        /* --- TABLE DESIGN --- */
        .leaderboard {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .box {
            background: #fff;
            box-shadow: var(--shadow);
            transform: skewX(-20deg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 5px;
            border: 1px solid #f0f0f0;
        }

        .box div {
            transform: skewX(20deg);
            font-weight: 900;
            font-size: 18px;
            text-align: center;
            width: 100%;
            outline: none;
        }

        /* Column Widths */
        .w-rank { width: 70px; }
        .w-name { width: 400px; position: relative; color: #000000; text-align: left !important; }
        .w-stat { width: 90px; color: #000; }
        .w-total { width: 110px; }

        /* Row Decorations */
        .data-row .w-name::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 20%;
            height: 60%;
            width: 5px;
            background: var(--primary-purple);
        }

        .head-row .box {
            background: none;
            box-shadow: none;
            border: none;
        }

        .head-row .box div {
            font-size: 14px;
            font-style: italic;
            color: #000;
        }

        /* Print Settings */
        @media print {
            body { background: white; padding: 0; }
            .controls { display: none !important; }
            .container { box-shadow: none; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn btn-add" onclick="addRow()">+ Add Player</button>
        <button class="btn btn-save" onclick="window.print()">Save/Download</button>
    </div>

    <div class="container">
        
        <!-- Header -->
        <div class="header-box">
            <div class="title-row">
              
                <h1 contenteditable="true">LEGEND ESPORTS</h1>
               
            </div>
            <div class="sub-title" contenteditable="true">PRO TOURNAMENT SERIES</div>
            <div class="bottom-line"></div>
        </div>

        <div class="leaderboard" id="player-list">
            <!-- Headers -->
            <div class="row head-row">
                <div class="box w-rank"><div contenteditable="true">#</div></div>
                <div class="box w-name"><div contenteditable="true">CS LEGEND</div></div>
                <div class="box w-stat"><div contenteditable="true">WIN</div></div>
                <div class="box w-stat"><div contenteditable="true">POS.</div></div>
                <div class="box w-stat"><div contenteditable="true">KILLS</div></div>
                <div class="box w-total"><div contenteditable="true">TOTAL</div></div>
            </div>

            <!-- Pre-filled Slots -->
            <div class="row data-row">
                <div class="box w-rank"><div contenteditable="true">01</div></div>
                <div class="box w-name"><div contenteditable="true">ARYAN</div></div>
                <div class="box w-stat"><div contenteditable="true">50</div></div>
                <div class="box w-stat"><div contenteditable="true">1</div></div>
                <div class="box w-stat"><div contenteditable="true">100</div></div>
                <div class="box w-total"><div contenteditable="true"></div></div>
            </div>

            <div class="row data-row">
                <div class="box w-rank"><div contenteditable="true">02</div></div>
                <div class="box w-name"><div contenteditable="true">BHUSHAN</div></div>
                <div class="box w-stat"><div contenteditable="true">20</div></div>
                <div class="box w-stat"><div contenteditable="true">2</div></div>
                <div class="box w-stat"><div contenteditable="true">50</div></div>
                <div class="box w-total"><div contenteditable="true"></div></div>
            </div>

            <div class="row data-row">
                <div class="box w-rank"><div contenteditable="true">03</div></div>
                <div class="box w-name"><div contenteditable="true">SANGHARSH</div></div>
                <div class="box w-stat"><div contenteditable="true">10</div></div>
                <div class="box w-stat"><div contenteditable="true">3</div></div>
                <div class="box w-stat"><div contenteditable="true">10</div></div>
                <div class="box w-total"><div contenteditable="true"></div></div>
            </div>
            
            <!-- Added 7 more empty slots to reach 10 total -->
            <script>
                for(let i=4; i<=10; i++){
                    document.write(`
                    <div class="row data-row">
                        <div class="box w-rank"><div contenteditable="true">${i < 10 ? '0'+i : i}</div></div>
                        <div class="box w-name"><div contenteditable="true">PLAYER NAME</div></div>
                        <div class="box w-stat"><div contenteditable="true">0</div></div>
                        <div class="box w-stat"><div contenteditable="true">0</div></div>
                        <div class="box w-stat"><div contenteditable="true">0</div></div>
                        <div class="box w-total"><div contenteditable="true"></div></div>
                    </div>
                    `);
                }
            </script>
        </div>
    </div>

    <script>
        function addRow() {
            const list = document.getElementById('player-list');
            const rowCount = document.querySelectorAll('.data-row').length + 1;
            const rankStr = rowCount < 10 ? '0' + rowCount : rowCount;

            const newRow = document.createElement('div');
            newRow.className = 'row data-row';
            newRow.innerHTML = `
                <div class="box w-rank"><div contenteditable="true">${rankStr}</div></div>
                <div class="box w-name"><div contenteditable="true">PLAYER NAME</div></div>
                <div class="box w-stat"><div contenteditable="true">0</div></div>
                <div class="box w-stat"><div contenteditable="true">0</div></div>
                <div class="box w-stat"><div contenteditable="true">0</div></div>
                <div class="box w-total"><div contenteditable="true"></div></div>
            `;
            list.appendChild(newRow);
        }
    </script>
</body>
</html>
