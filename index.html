<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Esports Leaderboard</title>
    <style>
        :root {
            --primary-color: #8100ba;
            --accent-color: #00f2ff;
            --bg-dark: #0f0c29;
            --text-white: #ffffff;
            --highlight: #ff00ea;
        }

        /* FIX: This forces the colors to show up when saving as PDF */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }

        body {
            background: #0f0c29; /* Fallback */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #8100ba);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            margin: 0;
            color: var(--text-white);
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .title-container {
            display: inline-block;
            transform: skewX(-20deg);
            background: #fff;
            padding: 10px 60px;
            box-shadow: 10px 10px 0px var(--accent-color);
            border-left: 10px solid var(--primary-color);
        }

        .main-title {
            transform: skewX(20deg);
            font-size: 60px;
            color: #000 !important;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
            outline: none;
        }

        .subtitle {
            background: var(--accent-color);
            color: #000 !important;
            display: inline-block;
            padding: 5px 20px;
            transform: skewX(-20deg) translateY(-10px);
            margin-left: 50px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle span {
            display: block;
            transform: skewX(20deg);
        }

        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: 2px solid var(--accent-color);
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transform: skewX(-20deg);
        }

        button span { display: inline-block; transform: skewX(20deg); }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            page-break-inside: avoid;
        }

        .box {
            transform: skewX(-20deg);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            outline: none;
            border: none;
            min-height: 48px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }

        .box span {
            transform: skewX(20deg);
            display: inline-block;
            width: 100%;
            text-align: center;
            font-weight: 900;
        }

        .col-num { width: 70px; background: #fff !important; color: #000 !important; font-size: 24px; }
        .col-name-head { width: 40%; background: rgba(255,255,255,0.2) !important; border: 1px solid #fff; }
        .col-name-row { width: 40%; background: var(--primary-color) !important; color: #fff !important; text-align: left; padding: 0 20px; border-left: 5px solid var(--accent-color); }
        
        .col-stat-head { width: 12%; background: #fff !important; color: #000 !important; font-size: 14px; }
        .col-stat-row { width: 12%; background: #e0e0e0 !important; color: #000 !important; font-size: 22px; }

        .box:focus {
            background: var(--highlight) !important;
            color: #fff !important;
        }

        .btn-del {
            background: #ff4b2b !important;
            color: white !important;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: skewX(-20deg);
            margin-left: 10px;
            font-weight: bold;
        }

        /* PRINT SETTINGS */
        @media print {
            body {
                background: #0f0c29 !important; /* Keep a dark background in PDF */
            }
            .controls, .btn-del {
                display: none !important; /* Hide buttons on the final save */
            }
            .main-title, .subtitle, .col-num, .col-stat-head {
                color: #000 !important;
            }
        }
    </style>
</head>
<body>

<div class="main-header">
    <div class="title-container">
        <h1 class="main-title" contenteditable="true">LEGEND ESPORTS</h1>
    </div>
    <br>
    <div class="subtitle" contenteditable="true">
        <span>PRO TOURNAMENT SERIES</span>
    </div>
</div>

<div class="controls">
    <button onclick="addRow()"><span>+ ADD NEW SLOT</span></button>
    <button onclick="window.print()"><span>SAVE / PRINT PDF</span></button>
</div>

<div class="container">
    <div class="row header-row">
        <div class="box col-num" contenteditable="true"><span>#</span></div>
        <div class="box col-name-head" contenteditable="true"><span>TEAM / PLAYER</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>WIN</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>POS.</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>KILLS</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>TOTAL</span></div>
    </div>
    <div id="table-body"></div>
</div>

<script>
    const tableBody = document.getElementById('table-body');
    let rowCount = 0;

    function addRow() {
        rowCount++;
        const displayNum = rowCount < 10 ? '0' + rowCount : rowCount;
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <div class="box col-num" contenteditable="true"><span>${displayNum}</span></div>
            <div class="box col-name-row" contenteditable="true"><span>ENTER NAME</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="btn-del" onclick="this.parentElement.remove()"><span>X</span></div>
        `;
        tableBody.appendChild(row);
    }

    for (let i = 0; i < 12; i++) { addRow(); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.hasAttribute('contenteditable')) {
            e.preventDefault();
            e.target.blur();
        }
    });
</script>

</body>
</html>
