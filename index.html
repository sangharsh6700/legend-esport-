<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Esports Leaderboard</title>
    <style>
        :root {
            --primary-color: #cf60ff;
            --accent-color: #cf60ff;
            --bg-dark: #ffffff;
            --text-white: #ffffff;
            --highlight: hsl(305, 82%, 78%);
        }

        body {
            background: linear-gradient(-45deg, #ffffff, #ffffff, #979797, #837e83);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            margin: 0;
            color: var(--text-white);
            min-height: 100vh;
            /* CRITICAL FOR PDF COLORS */
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LEGEND ESPORTS HEADER --- */
        .main-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .title-container {
            display: inline-block;
            transform: skewX(-20deg);
            background: #ffffff;
            padding: 10px 60px;
            box-shadow: 10px 10px 0px var(--accent-color);
            border-left: 10px solid var(--primary-color);
        }

        .main-title {
            transform: skewX(20deg);
            font-size: 60px;
            color: #000000;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
            outline: none;
        }

        .subtitle {
            background: var(--accent-color);
            color: #202020;
            display: inline-block;
            padding: 5px 20px;
            transform: skewX(-20deg) translateY(-10px);
            margin-left: 50px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle span {
            display: block;
            transform: skewX(20deg);
        }

        /* --- CONTROLS --- */
        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            background: rgba(253, 4, 4, 0.1);
            color: rgb(0, 0, 0);
            border: 2px solid var(--accent-color);
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transform: skewX(-20deg);
            transition: 0.3s;
        }

        button span {
            display: inline-block;
            transform: skewX(20deg);
        }

        button:hover {
            background: var(--accent-color);
            color: #ff0000;
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* --- LEADERBOARD TABLE --- */
        .container {
            width: 100%;
            max-width: 1000px;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            transition: 0.2s;
        }

        .box {
            transform: skewX(-20deg);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            outline: none;
            border: none;
            min-height: 48px;
            box-shadow: 4px 4px 10px rgba(68, 0, 255, 0.3);
            transition: 0.2s;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .box span {
            transform: skewX(20deg);
            display: inline-block;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            font-weight: 900;
        }

        /* Column Styles */
        .col-num { width: 70px; background: #bebcbc; color: #000000; font-size: 24px; }
        .col-name-head { width: 40%; background: rgba(196, 193, 193, 0.2); backdrop-filter: blur(5px); }
        
        /* Team Name Row - We will make text black here as requested */
        .col-name-row { 
            width: 40%; 
            background: var(--primary-color); 
            color: #000000; /* Text is now Black */
            text-align: left; 
            padding: 0 20px; 
            border-left: 5px solid var(--accent-color); 
        }
        
        .col-stat-head { width: 12%; background: #c0bebe; color: #000; font-style: italic; font-size: 14px; }
        .col-stat-row { width: 12%; background: #d4d1d1; color: #000; font-size: 22px; }

        /* Editable Focus State */
        .box:focus {
            background: var(--highlight) !important;
            color: #aaaaaa !important;
        }

        .header-row .box {
            min-height: 40px;
            background: hsl(0, 0%, 69%);
            color: #000000;
        }

        /* Delete Button */
        .btn-del {
            background: #ff4b2b;
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: 0.3s;
            transform: skewX(-20deg);
            margin-left: 10px;
            font-family: sans-serif;
            font-weight: bold;
        }

        .row:hover .btn-del { opacity: 1; }

        /* --- PDF / PRINT FIXES --- */
        @media print {
            body {
                background: linear-gradient(-45deg, #ff0000, #302b63, #24243e, #8100ba) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .controls, .btn-del { display: none !important; }
            
            /* Keeping the Purple background but ensuring text is black */
            .col-name-row {
                background-color: #dba5fa !important;
                color: #000 !important;
            }
            .box {
                box-shadow: none !important;
            }
            .subtitle {
                background-color: #a052ee !important;
            }
        }
    </style>
</head>
<body>

<div class="main-header">
    <div class="title-container">
        <h1 class="main-title" contenteditable="true">LEGEND ESPORTS</h1>
    </div>
    <br>
    <div class="subtitle" contenteditable="true">
        <span>PRO TOURNAMENT SERIES</span>
    </div>
</div>

<div class="controls">
    <button onclick="addRow()"><span>+ ADD NEW SLOT</span></button>
    <button onclick="window.print()"><span>SAVE / PRINT PDF</span></button>
</div>

<div class="container">
    <div class="row header-row">
        <div class="box col-num" contenteditable="true"><span>#</span></div>
        <div class="box col-name-head" contenteditable="true"><span>TEAM NAME / PLAYER</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>WIN</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>POS.</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>KILLS</span></div>
        <div class="box col-stat-head" contenteditable="true"><span>TOTAL</span></div>
    </div>
    <div id="table-body"></div>
</div>

<script>
    const tableBody = document.getElementById('table-body');
    let rowCount = 0;

    function addRow() {
        rowCount++;
        const displayNum = rowCount < 10 ? '0' + rowCount : rowCount;
        
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <div class="box col-num" contenteditable="true"><span>${displayNum}</span></div>
            <div class="box col-name-row" contenteditable="true"><span>ENTER NAME</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="box col-stat-row" contenteditable="true"><span>0</span></div>
            <div class="btn-del" onclick="this.parentElement.remove()"><span>X</span></div>
        `;
        tableBody.appendChild(row);
    }

    for (let i = 0; i < 12; i++) { addRow(); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.hasAttribute('contenteditable')) {
            e.preventDefault();
            e.target.blur();
        }
    });
</script>

</body>
</html>
